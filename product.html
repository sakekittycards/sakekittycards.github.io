  <style>
    /* ── Product page layout ── */
    .pdp { display: grid; grid-template-columns: 1.1fr 1fr; gap: 48px; align-items: start; }
    @media (max-width: 900px) { .pdp { grid-template-columns: 1fr; gap: 28px; } }

    .pdp-breadcrumb { font-size: 13px; color: var(--dim); margin-bottom: 18px; }
    .pdp-breadcrumb a { color: var(--muted); text-decoration: none; transition: color .15s; }
    .pdp-breadcrumb a:hover { color: var(--orange); }
    .pdp-breadcrumb .sep { margin: 0 8px; opacity: 0.5; }

    /* Gallery */
    .pdp-gallery { display: flex; flex-direction: column; gap: 12px; }
    .pdp-main-img-wrap {
      aspect-ratio: 1/1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .pdp-main-img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .pdp-main-placeholder { font-size: 72px; opacity: 0.3; }
    .pdp-thumbs { display: flex; gap: 10px; flex-wrap: wrap; }
    .pdp-thumb {
      width: 72px; height: 72px;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      padding: 0;
      transition: border-color .15s, transform .15s;
    }
    .pdp-thumb:hover { border-color: rgba(255,106,0,.45); transform: translateY(-2px); }
    .pdp-thumb.active { border-color: var(--orange); box-shadow: 0 0 0 2px rgba(255,106,0,.15); }
    .pdp-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Info panel */
    .pdp-info { padding-top: 4px; }
    .pdp-name {
      font-family: 'Bangers',cursive;
      font-size: clamp(28px, 4vw, 40px);
      letter-spacing: 0.04em;
      line-height: 1.1;
      background: linear-gradient(135deg,var(--orange),var(--pink));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 10px;
    }
    .pdp-price {
      font-family: 'Bangers',cursive;
      font-size: 32px;
      letter-spacing: 1px;
      color: var(--orange);
      margin-bottom: 20px;
    }
    .pdp-price .oos-flag {
      display: inline-block; margin-left: 10px;
      font-family: 'Inter',sans-serif; font-size: 12px; font-weight: 700;
      color: var(--dim); letter-spacing: 2px; text-transform: uppercase;
      padding: 3px 8px; border: 1px solid var(--border); border-radius: 4px;
      vertical-align: middle;
    }

    .pdp-section-label {
      font-size: 11px; font-weight: 700;
      color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 10px; margin-top: 22px;
    }

    /* Variant buttons */
    .pdp-variants { display: flex; flex-wrap: wrap; gap: 9px; }
    .pdp-variant-btn {
      padding: 10px 16px;
      background: rgba(255,255,255,.04);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 13px; font-weight: 600;
      font-family: 'Inter',sans-serif;
      cursor: pointer;
      transition: border-color .15s, background .15s, color .15s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .pdp-variant-btn:hover:not(:disabled) { border-color: rgba(255,106,0,.45); }
    .pdp-variant-btn.active { border-color: var(--orange); background: rgba(255,106,0,.09); }
    .pdp-variant-btn:disabled {
      opacity: 0.45; cursor: not-allowed;
      text-decoration: line-through; text-decoration-color: var(--dim);
    }
    .pdp-variant-btn .oos-mini {
      font-size: 10px; font-weight: 700; color: var(--dim);
      letter-spacing: 1px; text-transform: uppercase;
    }

    /* Add to cart */
    .pdp-actions { margin-top: 28px; display: flex; gap: 12px; flex-wrap: wrap; }
    .pdp-add-btn { flex: 1; min-width: 220px; justify-content: center; }

    /* Description */
    .pdp-desc {
      margin-top: 30px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
      font-size: 14px; line-height: 1.65; color: var(--muted);
    }
    .pdp-desc p { margin: 0 0 10px; }
    .pdp-desc p:last-child { margin-bottom: 0; }

    /* Status states */
    .pdp-status {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      padding: 80px 20px; text-align: center;
      color: var(--muted); font-size: 14px;
    }
    .pdp-status .shop-spinner { margin-bottom: 4px; }
    .pdp-status h3 { font-size: 18px; color: var(--text); margin-bottom: 6px; }
    .pdp-status a { color: var(--orange); text-decoration: none; }
  </style>

  <script>
    (async function loadProduct() {
      const statusEl = document.getElementById('pdpStatus');
      const root     = document.getElementById('pdpRoot');
      const esc      = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      const fmt      = n => `$${n.toFixed(2)}`;

      const params = new URLSearchParams(window.location.search);
      const id     = params.get('id');

      const renderError = (title, msg) => {
        statusEl.innerHTML = `
          <div class="shop-empty-icon">📦</div>
          <h3>${esc(title)}</h3>
          <p>${msg}</p>
          <p style="margin-top:14px"><a href="shop.html">← Back to shop</a></p>`;
      };

      if (!id) { renderError('Product not found', 'No product ID was provided.'); return; }

      let items;
      try {
        const res = await fetch(`${window.SK.WORKER_BASE}/items`);
        if (!res.ok) throw new Error(`worker ${res.status}`);
        const data = await res.json();
        items = Array.isArray(data.items) ? data.items : [];
      } catch (err) {
        renderError('Could not load product', 'Please try again in a moment.');
        return;
      }

      const item = items.find(i => i.id === id);
      if (!item) { renderError('Product not found', 'This product may have been removed or is no longer available.'); return; }

      const vars       = Array.isArray(item.variations) ? item.variations : [];
      const hasVars    = vars.length > 1;
      const defaultIdx = hasVars ? Math.max(0, vars.findIndex(v => v.inStock)) : 0;
      const oos        = item.inStock === false;

      // For apparel, many variants share the same color (e.g. Black/S, Black/M,
      // Black/L all use the same mockup). We group by the leading color name so
      // selecting any size pulls up that color's photo set.
      const colorOf = (v) => String(v.name || '').split(',')[0].trim().toLowerCase() || '__default__';

      // Images that belong to a given variant = every distinct mockup URL across
      // all same-color variants. With current Printful data that's usually just
      // one URL per color; if multiple angles get added later, the gallery grows.
      const galleryForVariant = (v) => {
        if (!v) return item.imageUrl ? [item.imageUrl] : [];
        const color = colorOf(v);
        const urls = vars
          .filter(x => colorOf(x) === color)
          .map(x => x.imageUrl)
          .filter(Boolean);
        // Dedup, preserving order
        const seen = new Set();
        const deduped = urls.filter(u => { if (seen.has(u)) return false; seen.add(u); return true; });
        return deduped.length ? deduped : (item.imageUrl ? [item.imageUrl] : []);
      };

      // Render description as real paragraphs: split on blank lines, drop empties.
      const descHtml = (item.description || '')
        .split(/\n{2,}/)
        .map(p => p.trim())
        .filter(Boolean)
        .map(p => `<p>${esc(p).replace(/\n/g, '<br>')}</p>`)
        .join('');

      document.title = `${item.name} — Sake Kitty Cards`;

      const initialGallery = galleryForVariant(vars[defaultIdx]);

      root.innerHTML = `
        <div class="pdp-breadcrumb">
          <a href="shop.html">Shop</a><span class="sep">›</span><span>${esc(item.name)}</span>
        </div>
        <div class="pdp">
          <div class="pdp-gallery">
            <div class="pdp-main-img-wrap">
              ${initialGallery.length
                ? `<img src="${esc(initialGallery[0])}" alt="${esc(item.name)}" class="pdp-main-img" id="pdpMainImg" />`
                : `<div class="pdp-main-placeholder">📦</div>`}
            </div>
            <div class="pdp-thumbs" id="pdpThumbs" ${initialGallery.length > 1 ? '' : 'hidden'}></div>
          </div>
          <div class="pdp-info">
            <h1 class="pdp-name">${esc(item.name)}</h1>
            <div class="pdp-price" id="pdpPrice">
              ${fmt(item.price)}${oos ? ' <span class="oos-flag">Sold Out</span>' : ''}
            </div>

            ${hasVars ? `
              <div class="pdp-section-label">Options</div>
              <div class="pdp-variants" id="pdpVariants" role="radiogroup" aria-label="Variant">
                ${vars.map((v, i) => `
                  <button type="button" class="pdp-variant-btn${i === defaultIdx ? ' active' : ''}"
                          data-idx="${i}"
                          role="radio" aria-checked="${i === defaultIdx}"
                          ${!v.inStock ? 'disabled' : ''}>
                    <span>${esc(v.name)}</span>
                    ${!v.inStock ? '<span class="oos-mini">Out</span>' : ''}
                  </button>`).join('')}
              </div>` : ''}

            <div class="pdp-actions">
              ${oos
                ? `<button type="button" class="btn btn-sm btn-disabled pdp-add-btn" disabled>Out of Stock</button>`
                : `<button type="button" class="btn btn-primary btn-lg pdp-add-btn" id="pdpAddBtn">Add to Cart</button>`}
            </div>

            ${descHtml ? `<div class="pdp-desc">${descHtml}</div>` : ''}
          </div>
        </div>`;

      statusEl.hidden = true;
      root.hidden = false;

      const mainImg  = document.getElementById('pdpMainImg');
      const priceEl  = document.getElementById('pdpPrice');
      const thumbsEl = document.getElementById('pdpThumbs');

      let selectedIdx = defaultIdx;

      const setMainImage = (url) => {
        if (!mainImg || !url) return;
        mainImg.src = url;
        thumbsEl?.querySelectorAll('.pdp-thumb').forEach(t => {
          t.classList.toggle('active', t.dataset.url === url);
        });
      };

      const renderThumbs = (urls) => {
        if (!thumbsEl) return;
        if (urls.length <= 1) {
          thumbsEl.hidden = true;
          thumbsEl.innerHTML = '';
          return;
        }
        thumbsEl.hidden = false;
        thumbsEl.innerHTML = urls.map((u, i) => `
          <button type="button" class="pdp-thumb${i === 0 ? ' active' : ''}" data-url="${esc(u)}" aria-label="View image ${i + 1}">
            <img src="${esc(u)}" alt="" />
          </button>`).join('');
        thumbsEl.querySelectorAll('.pdp-thumb').forEach(t => {
          t.addEventListener('click', () => setMainImage(t.dataset.url));
        });
      };

      renderThumbs(initialGallery);

      // Variant clicks: rebuild the gallery for the new color, swap main image,
      // update price, sync active state.
      document.querySelectorAll('.pdp-variant-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.disabled) return;
          const idx = +btn.dataset.idx;
          selectedIdx = idx;
          const v = vars[idx];

          document.querySelectorAll('.pdp-variant-btn').forEach(b => {
            const active = b === btn;
            b.classList.toggle('active', active);
            b.setAttribute('aria-checked', active ? 'true' : 'false');
          });

          const varPrice = v.price != null ? v.price : item.price;
          priceEl.innerHTML = `${fmt(varPrice)}${!v.inStock ? ' <span class="oos-flag">Sold Out</span>' : ''}`;

          const gallery = galleryForVariant(v);
          if (gallery[0]) setMainImage(gallery[0]);
          renderThumbs(gallery);
        });
      });

      // Add to cart
      const addBtn = document.getElementById('pdpAddBtn');
      addBtn?.addEventListener('click', () => {
        let cartItem = item;
        if (hasVars) {
          const v = vars[selectedIdx] || vars[0];
          cartItem = {
            id:          item.id + '__' + v.id,
            variationId: v.id,
            name:        item.name + ' – ' + v.name,
            price:       v.price != null ? v.price : item.price,
            imageUrl:    v.imageUrl || item.imageUrl,
            inStock:     v.inStock,
          };
        }
        window.SK.addToCart(cartItem);
        const orig = addBtn.textContent;
        addBtn.textContent = '✓ Added to Cart';
        setTimeout(() => { addBtn.textContent = orig; }, 1400);
      });
    })();
  </script>
